<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dairy - Tasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        .navbar {
            background-color: #1D9E75;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: white;
            font-size: 20px;
        }

        .navbar button {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .add-task input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .add-task button {
            padding: 12px 20px;
            background-color: #1D9E75;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .task-item {
            background: white;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-title {
            font-size: 15px;
            color: #333;
        }

        .task-title.done {
            text-decoration: line-through;
            color: #aaa;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-complete {
            background: #E1F5EE;
            color: #0F6E56;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-delete {
            background: #FAECE7;
            color: #993C1D;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>Student Dairy</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>
        <div id="taskList"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'index.html';
        }

        async function loadTasks() {
            const response = await fetch('http://127.0.0.1:8000/api/tasks/', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const tasks = await response.json();
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';
            tasks.forEach(task => {
                taskList.innerHTML += `
                    <div class="task-item">
                        <span class="task-title ${task.is_completed ? 'done' : ''}">${task.title}</span>
                        <div class="task-actions">
                            <button class="btn-complete" onclick="completeTask(${task.id})">Done</button>
                            <button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        async function addTask() {
            const title = document.getElementById('taskInput').value;
            await fetch('http://127.0.0.1:8000/api/tasks/', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, is_completed: false })
            });
            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        async function completeTask(id) {
            await fetch(`http://127.0.0.1:8000/api/tasks/${id}/`, {
                method: 'PATCH',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ is_completed: true })
            });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`http://127.0.0.1:8000/api/tasks/${id}/`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            loadTasks();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        loadTasks();
    </script>

</body>
</html>
