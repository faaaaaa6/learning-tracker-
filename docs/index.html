<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Student Dairy</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
    }
    body {
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container {
        background-color: white;
        padding: 40px;
        border-radius: 12px;
        width: 380px;
    }
    h1 {
        color: #0F6E56;
        font-size: 24px;
        margin-bottom: 8px;
    }
    p {
        color: #888;
        margin-bottom: 24px;
        font-size: 14px;
    }
    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
    }
    button {
        width: 100%;
        padding: 12px;
        background-color: #1D9E75;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        margin-bottom: 12px;
    }
    .toggle-text {
        text-align: center;
        color: #0F6E56;
        cursor: pointer;
        font-size: 14px;
        margin-top: 8px;
    }
    .toggle-text span {
        font-weight: bold;
        text-decoration: underline;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Student Dairy</h1>
        <p>Track your daily learning goals</p>

        <div id="login-form">
            <h2 style="margin-bottom:16px; color:#333;">Login</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="login()">Login</button>
            <p class="toggle-text">Don't have an account? <span onclick="showRegister()">Register here</span></p>
        </div>

        <div id="register-form" style="display:none;">
            <h2 style="margin-bottom:16px; color:#333;">Register</h2>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Password">
            <button onclick="register()">Register</button>
            <p class="toggle-text">Already have an account? <span onclick="showLogin()">Login here</span></p>
        </div>
    </div>

<script>
    function showRegister() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }

    async function login() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        const response = await fetch('https://student-dairy.onrender.com/api/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.access) {
            localStorage.setItem('token', data.access);
            window.location.href = 'tasks.html';
        } else {
            alert('Wrong username or password!');
        }
    }

    async function register() {
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        const response = await fetch('https://student-dairy.onrender.com/api/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (data.username) {
            alert('Registration successful! Please login.');
            showLogin();
        } else {
            alert('Registration failed! Try a different username.');
        }
    }
</script>
</body>
</html>
